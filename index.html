<!DOCTYPE html>
<html lang="en">
<head>

  <!-- Title shown in the browser tab -->

  <!-- Loads the CSS file for this page -->
  <link rel="stylesheet" href="css\home.css" />
</head>
<body>

  </div>

</html>
